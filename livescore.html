<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sync Scoreboard for OBS</title>
    <!-- Nhúng thư viện Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --team-a: #1040a3; --team-b: #c8102e; }
        body { background-color: transparent; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: Arial; }
        #main-ui { display: none; }
        .scoreboard { display: flex; height: 45px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); border-radius: 2px; overflow: hidden; }
        .box { display: flex; align-items: center; justify-content: center; padding: 0 15px; font-weight: bold; font-size: 22px; outline: none; }
        .team-a { background: var(--team-a); color: white; min-width: 65px; }
        .score { background: white; color: #000033; min-width: 80px; }
        .team-b { background: var(--team-b); color: white; min-width: 65px; }
        .timer { background: white; color: black; min-width: 90px; border-left: 1px solid #ddd; }
        .phase { background: rgba(0,0,0,0.8); color: #ffcc00; font-size: 11px; font-weight: bold; padding: 2px 10px; border-radius: 3px 3px 0 0; align-self: flex-start; }
        .admin-controls { margin-top: 20px; background: #333; padding: 10px; border-radius: 8px; color: white; display: none; }
    </style>
</head>
<body>

<div id="auth-gate"></div>

<div id="main-ui">
    <div class="phase" id="phase" contenteditable="true">1ST</div>
    <div class="scoreboard">
        <div class="box team-a" id="teamA" contenteditable="true">BIR</div>
        <div class="box score">
            <span id="scoreA" contenteditable="true">0</span>-<span id="scoreB" contenteditable="true">0</span>
        </div>
        <div class="box team-b" id="teamB" contenteditable="true">WRE</div>
        <div class="box timer" id="timerDisplay">00:00</div>
    </div>

    <!-- Chỉ hiện khi là người điều khiển -->
    <div class="admin-controls" id="controls">
        <button onclick="toggleTimer()">Start/Stop</button>
        <button onclick="resetTimer()">Reset</button>
        <input type="color" oninput="updateColor('A', this.value)" value="#1040a3">
        <input type="color" oninput="updateColor('B', this.value)" value="#c8102e">
        <p style="font-size: 10px;">Thay đổi thông tin sẽ tự đồng bộ sang OBS BLV</p>
    </div>
</div>

<script>
    // --- CẤU HÌNH FIREBASE ---
    const firebaseConfig = {
        databaseURL: "https://scoreboard-742ce-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref("match_data");

    // --- BIẾN TRẠNG THÁI ---
    let isAdmin = false;
    let timerInterval;

    // --- KIỂM TRA QUYỀN TRUY CẬP ---
    const key = prompt("Nhập KEY (Để trống nếu chỉ xem trên OBS):");
    if(key === "FI68") {
        isAdmin = true;
        document.getElementById('controls').style.display = 'flex';
    }
    document.getElementById('main-ui').style.display = 'block';

    // --- ĐỒNG BỘ DỮ LIỆU TỪ FIREBASE ---
    db.on("value", (snapshot) => {
        const data = snapshot.val();
        if(!data) return;
        
        // Cập nhật giao diện (cho cả Admin và OBS)
        if(!isAdmin) { // Nếu là người xem thì mới cập nhật đè nội dung
            document.getElementById('phase').innerText = data.phase;
            document.getElementById('teamA').innerText = data.teamA;
            document.getElementById('teamB').innerText = data.teamB;
            document.getElementById('scoreA').innerText = data.scoreA;
            document.getElementById('scoreB').innerText = data.scoreB;
        }
        document.getElementById('timerDisplay').innerText = data.time;
        document.documentElement.style.setProperty('--team-a', data.colorA);
        document.documentElement.style.setProperty('--team-b', data.colorB);
    });

    // --- GỬI DỮ LIỆU LÊN FIREBASE (CHỈ ADMIN) ---
    if(isAdmin) {
        const sync = () => {
            db.update({
                phase: document.getElementById('phase').innerText,
                teamA: document.getElementById('teamA').innerText,
                teamB: document.getElementById('teamB').innerText,
                scoreA: document.getElementById('scoreA').innerText,
                scoreB: document.getElementById('scoreB').innerText,
                colorA: getComputedStyle(document.documentElement).getPropertyValue('--team-a'),
                colorB: getComputedStyle(document.documentElement).getPropertyValue('--team-b')
            });
        };
        // Thay đổi chữ
        document.querySelectorAll('[contenteditable]').forEach(el => {
            el.addEventListener('input', sync);
        });
    }

    // --- LOGIC ĐỒNG HỒ ---
    function toggleTimer() {
        if(!isAdmin) return;
        let isRunning = false; 
        // Logic đồng hồ admin sẽ tính toán và db.update({ time: ... }) mỗi giây
        // Để đơn giản, Admin sẽ đếm giây và gửi giá trị thời gian lên Firebase
        if(window.timerActive) {
            clearInterval(window.timerActive);
            window.timerActive = null;
        } else {
            window.timerActive = setInterval(() => {
                let timeParts = document.getElementById('timerDisplay').innerText.split(':');
                let sec = parseInt(timeParts[0])*60 + parseInt(timeParts[1]) + 1;
                let display = Math.floor(sec/60).toString().padStart(2,'0') + ":" + (sec%60).toString().padStart(2,'0');
                db.update({ time: display });
            }, 1000);
        }
    }

    function updateColor(team, val) {
        if(team === 'A') db.update({ colorA: val });
        else db.update({ colorB: val });
    }
</script>
</body>
</html>
