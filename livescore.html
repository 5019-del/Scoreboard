<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Scoreboard</title>
    <style>
        :root {
            --team-a-bg: #1040a3; 
            --team-b-bg: #c8102e; 
            --white-bg: #ffffff;
            --text-dark: #000033;
            --text-light: #ffffff;
        }

        /* Ẩn nội dung khi chưa nhập key */
        #main-content { display: none; }

        body {
            font-family: 'Arial', sans-serif;
            background-color: #1a1a1a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
        }

        .scoreboard-wrapper {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .match-phase {
            background-color: rgba(0, 0, 0, 0.8);
            color: #ffcc00;
            font-size: 11px;
            font-weight: bold;
            padding: 2px 10px;
            text-transform: uppercase;
            border-radius: 3px 3px 0 0;
            outline: none;
        }

        .scoreboard-container {
            display: flex;
            height: 45px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            overflow: hidden;
            border-radius: 2px;
        }

        .box {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding: 0 15px;
            font-weight: bold;
            font-size: 22px;
            outline: none;
        }

        .team-a { background-color: var(--team-a-bg); color: var(--text-light); min-width: 65px; transition: background 0.3s; }
        .score { background-color: var(--white-bg); color: var(--text-dark); min-width: 80px; font-size: 24px; }
        .team-b { background-color: var(--team-b-bg); color: var(--text-light); min-width: 65px; transition: background 0.3s; }
        
        .timer-container {
            background-color: var(--white-bg);
            color: var(--text-dark);
            min-width: 90px;
            border-left: 1px solid #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #timer-display { font-weight: 500; outline: none; }

        .controls {
            margin-top: 25px;
            display: flex;
            align-items: center;
            gap: 15px;
            background: #333;
            padding: 10px 20px;
            border-radius: 8px;
        }

        .color-group { display: flex; align-items: center; gap: 8px; color: white; font-size: 12px; }
        input[type="color"] { border: none; width: 25px; height: 25px; cursor: pointer; background: none; }
        button { padding: 6px 12px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; text-transform: uppercase; font-size: 11px; }
        .btn-start { background: #28a745; color: white; }
        .btn-reset { background: #6c757d; color: white; }
    </style>
</head>
<body>

    <!-- Nội dung bảng điểm -->
    <div id="main-content">
        <div class="scoreboard-wrapper">
            <div class="match-phase" contenteditable="true">1ST</div>
            
            <div class="scoreboard-container">
                <div class="box team-a" contenteditable="true">BIR</div>
                <div class="box score">
                    <span contenteditable="true">0</span>
                    <span>-</span>
                    <span contenteditable="true">0</span>
                </div>
                <div class="box team-b" contenteditable="true">WRE</div>
                <div class="timer-container">
                    <div id="timer-display" contenteditable="true">00:00</div>
                </div>
            </div>

            <div class="controls">
                <div class="color-group">
                    Team 1: <input type="color" id="colorA" value="#1040a3" oninput="changeColor('A', this.value)">
                </div>
                <div class="color-group">
                    Team 2: <input type="color" id="colorB" value="#c8102e" oninput="changeColor('B', this.value)">
                </div>
                <button class="btn-start" onclick="toggleTimer()" id="startBtn">Start</button>
                <button class="btn-reset" onclick="resetTimer()">Reset</button>
            </div>
        </div>
    </div>

<script>
    // 1. CẤU HÌNH KEY CỦA BẠN TẠI ĐÂY
    const SECRET_KEY = "FI68"; 

    // Kiểm tra key khi vừa mở trang
    window.onload = function() {
        const userKey = prompt("进攻");
        if (userKey === SECRET_KEY) {
            document.getElementById('main-content').style.display = 'block';
        } else {
            alert("Warning");
            document.body.innerHTML = "<h1 style='color:red; text-align:center;'>ACCESS DENIED</h1>";
        }
    };

    // Logic Đổi màu
    function changeColor(team, color) {
        if(team === 'A') {
            document.documentElement.style.setProperty('--team-a-bg', color);
        } else {
            document.documentElement.style.setProperty('--team-b-bg', color);
        }
    }

    // Logic Đồng hồ
    let timerInterval;
    let totalSeconds = 0;
    let isRunning = false;

    function updateDisplay() {
        const minutes = Math.floor(totalSeconds / 60);
        const seconds = totalSeconds % 60;
        document.getElementById('timer-display').innerText = 
            `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
    }

    function toggleTimer() {
        const btn = document.getElementById('startBtn');
        if (isRunning) {
            clearInterval(timerInterval);
            btn.innerText = "Start";
            btn.style.background = "#28a745";
        } else {
            const currentTime = document.getElementById('timer-display').innerText.split(':');
            totalSeconds = (parseInt(currentTime[0]) * 60) + parseInt(currentTime[1]);
            timerInterval = setInterval(() => { totalSeconds++; updateDisplay(); }, 1000);
            btn.innerText = "Stop";
            btn.style.background = "#dc3545";
        }
        isRunning = !isRunning;
    }

    function resetTimer() {
        clearInterval(timerInterval);
        isRunning = false;
        totalSeconds = 0;
        updateDisplay();
        document.getElementById('startBtn').innerText = "Start";
        document.getElementById('startBtn').style.background = "#28a745";
    }
</script>

</body>
</html>
